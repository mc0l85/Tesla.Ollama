[Service]
# --- GPU Clock Boost (P40: 1303 → 1531 MHz, +17.5%) ---
# Requires sudoers: myron ALL=(ALL) NOPASSWD: /usr/bin/nvidia-smi
ExecStartPre=+/usr/bin/nvidia-smi -ac 3615,1531

# --- Memory Lock (was 8MB, now unlimited for GPU DMA pinned memory) ---
LimitMEMLOCK=infinity

# --- Ollama Environment ---
Environment="PATH=/home/myron/.local/bin:/home/myron/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin"
Environment="OLLAMA_HOST=0.0.0.0"
Environment="OLLAMA_ORIGINS=*"
Environment="OLLAMA_FLASH_ATTENTION=1"
Environment="OLLAMA_KV_CACHE_TYPE=q4_0"
Environment="OLLAMA_KEEP_ALIVE=-1"
Environment="OLLAMA_NUM_PARALLEL=1"
Environment="OLLAMA_MAX_LOADED_MODELS=1"
Environment="CUDA_VISIBLE_DEVICES=0"

# --- CUDA/ggml Backend Flags ---
# GGML_CUDA_FORCE_MMQ=1 — TESTED AND REJECTED
# Marginal gains on MoE models (+4%) but catastrophic regression on qwen2.5-coder (-79%)
# MMQ kernels are not universally faster; removed as Ollama default in 0.1.32 for this reason
